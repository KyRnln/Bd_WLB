<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>达人管理</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/modules.css">
</head>
<body class="page-creator">
  <h1>达人管理</h1>
  <div class="muted">查看和管理所有达人信息，支持搜索、编辑和删除。</div>

  <div class="card-actions" style="margin-bottom: 16px;">
    <button id="importCreatorBtn" class="btn-sm">导入 XLSX</button>
    <button id="downloadCreatorTemplateBtn" class="btn-sm">下载模板</button>
    <button id="clearAllCreatorsBtn" class="btn-sm" style="border-color: #dc2626; color: #dc2626;">删除全部</button>
    <input id="creatorFileInput" type="file" accept=".xlsx" style="display:none;" />
  </div>

  <div class="search-section">
    <input id="creatorSearchInput" type="text" placeholder="搜索达人ID、CID、地区或备注..." />
  </div>

  <div class="stats-row">
    <div class="stat">总计: <strong id="totalCount">0</strong></div>
    <div class="stat">已搜索: <strong id="searchCount">0</strong></div>
  </div>

  <div id="creatorTagBar" class="tagbar"></div>

  <div id="status" class="status info"></div>

  <div id="creatorList" class="creator-list"></div>

  <div id="creatorEditDialog" class="dialog-mask">
    <div class="dialog">
      <h3>编辑达人信息</h3>
      <label for="creatorEditId">达人ID</label>
      <input id="creatorEditId" type="text" readonly />
      <label for="creatorEditCid">达人CID（选填）</label>
      <input id="creatorEditCid" type="text" placeholder="输入达人CID" />
      <label for="creatorEditRegion">地区代码（选填）</label>
      <input id="creatorEditRegion" type="text" placeholder="例如：MY/TH/ID/SG/PH/VN" />
      <label for="creatorEditTag">标签（选填）</label>
      <input id="creatorEditTag" type="text" placeholder="输入标签名称" />
      <label for="creatorEditRemark">备注信息（选填）</label>
      <textarea id="creatorEditRemark" placeholder="输入达人的备注信息" style="min-height: 60px;"></textarea>
      <div class="footer">
        <button id="cancelCreatorEditBtn" class="btn-sm">取消</button>
        <button id="saveCreatorEditBtn" class="btn-sm">保存</button>
        <button id="deleteCreatorBtn" class="btn-sm">删除</button>
      </div>
    </div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="creator.js"></script>
</body>
</html>
