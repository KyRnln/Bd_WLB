<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>获取订单履约情况</title>
  <style>
    body {
      width: 480px;
      min-height: 520px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f7f7f9;
      color: #222;
      box-sizing: border-box;
      padding: 16px 20px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .back-btn {
      flex: none;
      padding: 6px 12px;
      background: #6c757d;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .back-btn:hover {
      background: #5a6268;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #1a365d;
    }

    .card {
      margin-top: 16px;
      border: 1px solid #e0e6ff;
      border-radius: 10px;
      background: #f0f4ff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      box-sizing: border-box;
      overflow: hidden;
      padding: 14px;
    }

    .status {
      display: none;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .status.success {
      display: block;
      background: #e7f8ec;
      color: #117a42;
    }

    .status.info {
      display: block;
      background: #eef4ff;
      color: #2b4acb;
    }

    .status.error {
      display: block;
      background: #fdecea;
      color: #c0392b;
    }

    .description {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      min-height: 120px;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.success {
      background: #28a745;
    }

    button.info {
      background: #0369a1;
    }

    button.warning {
      background: #f59e0b;
    }

    button.secondary {
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      box-shadow: none;
    }

    button.secondary:hover {
      background: #f8f9fa;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .progress-display {
      display: none;
      padding: 20px;
      text-align: center;
      background: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
      white-space: pre-line;
      font-size: 13px;
      color: #333;
      min-height: 80px;
      align-items: center;
      justify-content: center;
    }

    .progress-display.show {
      display: flex;
    }

    .progress-bar {
      display: none;
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar.show {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff0050, #ff6b9d);
      width: 0%;
      transition: width 0.3s ease;
    }

    .input-area {
      display: block;
    }

    .input-area.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>获取订单履约情况</h1>
  </div>

  <div class="card">
    <div id="orderPanelStatus" class="status info"></div>
    <div class="description">通过订单ID查询达人履约情况并导出XLSX</div>

    <div id="inputArea" class="input-area">
      <textarea id="orderIdInput" placeholder="请输入订单号，每行一个&#10;例如：&#10;581439468539577962&#10;581813278309582149" rows="5"></textarea>
    </div>

    <div id="progressDisplay" class="progress-display">准备查询...</div>

    <div id="orderProgressBar" class="progress-bar">
      <div id="orderProgressFill" class="progress-fill"></div>
    </div>

    <div class="button-group">
      <button class="success" id="startOrderQueryBtn">开始查询并下载</button>
      <button class="warning" id="stopOrderQueryBtn" style="display:none;">停止查询</button>
    </div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="order.js"></script>
</body>

</html>
