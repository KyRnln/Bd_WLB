<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>获取订单履约情况</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/modules.css">
</head>
<body class="page-tool">
  <div class="page-header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>获取订单履约情况</h1>
  </div>

  <div class="card">
    <div id="orderPanelStatus" class="panel-status info"></div>
    <div id="orderDescription" class="description">通过订单ID查询达人履约情况并导出XLSX</div>

    <div id="orderProgressBar" class="progress-display" style="padding: 12px; min-height: auto; margin-bottom: 16px; gap: 12px;">
      <div class="progress-track">
        <div id="orderProgressFill" class="progress-fill"></div>
      </div>
      <span id="orderProgressText" class="progress-text">0/0</span>
    </div>

    <div id="inputArea" class="input-area">
      <textarea id="orderIdInput" placeholder="请输入订单号，每行一个&#10;例如：&#10;581439468539577962&#10;581813278309582149" rows="5"></textarea>
    </div>

    <div id="progressDisplay" class="progress-display">准备查询...</div>

    <div id="orderProgressBar" class="progress-bar">
      <div id="orderProgressFill" class="progress-fill"></div>
    </div>

    <div class="button-group">
      <button class="btn-sm" id="startOrderQueryBtn">开始查询并下载</button>
      <button class="btn-sm" id="stopOrderQueryBtn" style="display:none;">停止查询</button>
    </div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="order.js"></script>
</body>
</html>
