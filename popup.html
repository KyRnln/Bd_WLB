<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商务WLB插件</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/utilities.css">
</head>

<body>
  <div class="main">
    <div id="creatorCard" class="card">
      <div id="creatorCardStatus" class="status info" style="display:none;"></div>
      <div class="card-header">
        <div class="card-title">达人管理</div>
        <span class="card-desc">通过 XLSX 导入达人ID，页面会自动匹配并高亮达人</span>
      </div>
      <div class="card-actions">
        <button id="openCreatorManageBtn" class="btn-sm">达人管理</button>
      </div>
      <div class="mt-3">
        <input id="creatorSearchInput" type="text" placeholder="通过达人ID，CID，地区搜索..." class="search-input" />
      </div>
      <div id="creatorPreview"></div>
      <div id="creatorSearchResults" class="search-results">
        <div class="text-sm text-muted mb-2">搜索结果：</div>
        <div id="creatorSearchList" class="search-list"></div>
      </div>
    </div>

    <div id="toolsCard" class="card">
      <div class="text-base text-muted text-center mb-3">选择要使用的功能</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <button id="btnCover" class="tool-btn" style="padding: 6px 8px; font-size: 13px;">📹 获取视频封面</button>
        <button id="btnCid" class="tool-btn" style="padding: 6px 8px; font-size: 13px;">👤 获取头像/CID</button>
        <button id="btnCidToName" class="tool-btn" style="padding: 6px 8px; font-size: 13px;">🔍 CID获取达人</button>
        <button id="btnOrder" class="tool-btn" style="padding: 6px 8px; font-size: 13px;">📦 订单履约情况</button>
      </div>
    </div>

    <div id="translateCard" class="card">
      <div class="card-header">
        <div class="card-title">AI翻译</div>
        <span id="translateModelInfo" class="card-desc">未配置</span>
      </div>
      <div class="card-actions">
        <button id="btnTranslate" class="btn-sm">🌐 翻译配置</button>
      </div>
    </div>

    <div id="phraseCard" class="card">
      <div id="phraseCardStatus" class="status info" style="display:none;"></div>
      <div class="card-header">
        <div class="card-title">短语管理</div>
        <span class="card-desc">快捷短语输入"/"触发</span>
      </div>
      <div id="tagBar" class="tagbar"></div>
      <div id="phraseList" style="display:none;"></div>
    </div>

    <div id="dataCard" class="card">
      <div id="dataCardStatus" class="status info" style="display:none;"></div>
      <div class="card-header">
        <div class="card-title">数据管理</div>
        <span class="card-desc">备份与恢复数据</span>
      </div>
      <div class="card-actions">
        <button id="backupBtn" class="btn-sm">备份数据</button>
        <button id="initAppBtn" class="btn-sm">初始化应用</button>
        <button id="clearAllDataBtn" class="btn-sm">清除全部数据</button>
      </div>
    </div>
  </div>

  <div id="phraseEditDialog" class="dialog-mask">
    <div class="dialog">
      <h3 id="phraseEditTitle">添加短语</h3>
      <label for="phraseTag">标签（必选）</label>
      <select id="phraseTag"></select>
      <label for="phraseTitle">标题</label>
      <input id="phraseTitle" type="text" placeholder="例如：常用回复" />
      <label for="phraseContent">内容</label>
      <textarea id="phraseContent" placeholder="输入要插入的文本"></textarea>
      <div class="footer">
        <button id="cancelPhraseBtn" class="btn-sm">取消</button>
        <button id="savePhraseBtn" class="btn-sm">保存</button>
      </div>
    </div>
  </div>

  <div id="creatorEditDialog" class="dialog-mask">
    <div class="dialog">
      <h3>编辑达人信息</h3>
      <label for="creatorEditId">达人ID</label>
      <input id="creatorEditId" type="text" readonly />
      <label for="creatorEditCid">达人CID（选填）</label>
      <input id="creatorEditCid" type="text" placeholder="输入达人CID" />
      <label for="creatorEditRegion">地区代码（选填）</label>
      <input id="creatorEditRegion" type="text" placeholder="例如：MY/TH/ID/SG/PH/VN" />
      <label for="creatorEditTag">标签（选填）</label>
      <input id="creatorEditTag" type="text" placeholder="例如：绩效达人、流失达人、隐藏达人" />
      <label for="creatorEditRemark">备注信息（选填）</label>
      <textarea id="creatorEditRemark" placeholder="输入达人的备注信息" style="min-height: 60px;"></textarea>
      <div class="footer">
        <button id="cancelCreatorEditBtn" class="btn-sm">取消</button>
        <button id="saveCreatorEditBtn" class="btn-sm">保存</button>
        <button id="deleteCreatorBtn" class="btn-sm">删除</button>
      </div>
    </div>
  </div>

  <div id="backupDialog" class="dialog-mask">
    <div class="dialog">
      <h3>数据备份与恢复</h3>
      <details class="panel">
        <summary class="custom-summary">
          <span>本地备份与恢复</span>
        </summary>
        <div class="panel-content">
          <div class="mb-4">
            <h4>导出数据</h4>
            <p>将所有数据导出为JSON文件，方便备份和迁移</p>
            <button id="exportDataBtn" class="btn-sm w-full">导出数据</button>
          </div>
          <div class="pt-4" style="border-top:1px solid var(--card-border);">
            <h4>导入数据</h4>
            <p>从JSON文件导入数据，会覆盖现有数据</p>
            <input id="importDataFile" type="file" accept=".json" class="w-full mb-2" />
            <button id="importDataBtn" class="btn-sm w-full">导入数据</button>
          </div>
        </div>
      </details>

      <details class="panel">
        <summary class="custom-summary">
          <span>WebDAV 同步</span>
        </summary>
        <div class="panel-content">
          <p>通过坚果云等WebDAV服务云端备份与恢复</p>
          <label for="webdavUrl">服务器地址 (例如: 坚果云)</label>
          <input id="webdavUrl" type="text" placeholder="https://dav.jianguoyun.com/dav/" value="https://dav.jianguoyun.com/dav/" />
          <label for="webdavUsername">账号 (邮箱)</label>
          <input id="webdavUsername" type="text" placeholder="输入WebDAV账号" />
          <label for="webdavPassword">应用密码</label>
          <input id="webdavPassword" type="password" placeholder="输入WebDAV应用密码" />
          <div class="flex gap-3 mt-3">
            <button id="backupToWebdavBtn" class="btn-sm flex-1">备份到WebDAV</button>
            <button id="restoreFromWebdavBtn" class="btn-sm flex-1">从WebDAV恢复</button>
          </div>
          <div id="webdavStatus" class="status" style="display:none;"></div>
        </div>
      </details>
      <div class="footer">
        <button id="closeBackupDialogBtn" class="btn-sm">关闭</button>
      </div>
    </div>
  </div>

  <script src="libs/exceljs.min.js"></script>
  <script src="phrase/phrase.js"></script>
  <script src="Creator/creator.js"></script>
  <script src="popup.js"></script>

  <div class="footer-text">
    Powered by "电子恐龙" with AI
  </div>
</body>

</html>
