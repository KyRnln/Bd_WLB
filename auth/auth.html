<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 商务WLB插件</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>📦 商务WLB</h1>
        <p class="subtitle">工作是为了更好的生活</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail">邮箱</label>
          <input type="email" id="loginEmail" name="email" required placeholder="输入邮箱地址" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" name="password" required placeholder="输入密码" autocomplete="current-password">
        </div>
        <div id="loginError" class="error-message" style="display:none;"></div>
        <button type="submit" class="btn-primary">登录</button>
      </form>

      <form id="registerForm" class="auth-form" style="display:none;">
        <div class="form-group">
          <label for="registerUsername">用户名</label>
          <input type="text" id="registerUsername" name="username" required placeholder="输入用户名" autocomplete="username" minlength="2" maxlength="32">
        </div>
        <div class="form-group">
          <label for="registerEmail">邮箱</label>
          <input type="email" id="registerEmail" name="email" required placeholder="输入邮箱地址" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="registerPassword">密码</label>
          <input type="password" id="registerPassword" name="password" required placeholder="输入密码（至少6位）" autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label for="registerConfirmPassword">确认密码</label>
          <input type="password" id="registerConfirmPassword" name="confirmPassword" required placeholder="再次输入密码" autocomplete="new-password" minlength="6">
        </div>
        <div id="registerError" class="error-message" style="display:none;"></div>
        <button type="submit" class="btn-primary">注册</button>
      </form>

      <div id="authStatus" class="status" style="display:none;"></div>
    </div>

    <div class="auth-footer">
      <a href="../popup.html">继续使用离线版本</a>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
