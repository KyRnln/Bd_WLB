<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短语管理</title>
  <style>
    body {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f7f7f9;
      color: #222;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 800;
    }
    .muted { color: #666; font-size: 12px; margin: 6px 0 18px; }
    .actions { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    button {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      background: #ff0050;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 10px rgba(255, 0, 80, 0.28);
    }
    button.secondary { background: #555; }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .tagbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 2px 0 12px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .tagbar::-webkit-scrollbar { height: 6px; }
    .tagbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 99px; }
    .tag-chip {
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e6e6ea;
      background: #fff;
      color: #333;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .tag-chip.active {
      border-color: rgba(255, 0, 80, 0.55);
      box-shadow: 0 2px 10px rgba(255, 0, 80, 0.10);
      color: #ff0050;
      font-weight: 700;
    }
    .tag-chip.manage {
      margin-left: auto;
      background: #fff7fa;
      border-color: rgba(255, 0, 80, 0.35);
      color: #ff0050;
      font-weight: 700;
    }
    #status { display:none; margin-top:10px; padding:10px; border-radius:6px; font-size:12px; }
    .status.success { display:block; background:#e7f8ec; color:#117a42; }
    .status.info { display:block; background:#eef4ff; color:#2b4acb; }
    .status.error { display:block; background:#fdecea; color:#c0392b; }
    #phraseList { margin-top: 6px; }
    .phrase-item {
      background: #fff;
      border-radius: 10px;
      padding: 12px 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .phrase-item .title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #222; }
    .phrase-item .content { font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .phrase-actions { display: flex; gap: 6px; }
    .phrase-actions button { flex: none; padding: 6px 10px; font-size: 12px; box-shadow: none; }
    .dialog-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center; z-index: 999;
    }
    .dialog-mask.show { display: flex; }
    .dialog {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      width: 420px; max-width: 90vw;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .dialog h3 { margin: 0 0 12px; font-size: 16px; color: #222; }
    .dialog label { font-size: 12px; color: #555; display: block; margin-bottom: 6px; }
    .dialog input, .dialog textarea, .dialog select {
      width: 100%; box-sizing: border-box; padding: 10px;
      border: 1px solid #ddd; border-radius: 8px; font-size: 13px; margin-bottom: 12px; font-family: inherit;
    }
    .dialog textarea { min-height: 120px; resize: vertical; }
    .dialog .footer { display: flex; gap: 10px; margin-top: 6px; }
    .dialog .footer button { flex:1; }
    .muted { color: #666; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>短语管理</h1>
  <div class="muted">在独立页管理短语，支持标签切换、添加/编辑/删除。</div>
  <div class="actions">
    <button id="addPhraseBtn" style="background:#ff7a00;">添加短语</button>
  </div>
  <div id="status" class="status info"></div>
  <div id="tagBar" class="tagbar"></div>
  <div id="phraseList"></div>

  <!-- 标签管理弹窗 -->
  <div id="tagManageDialog" class="dialog-mask">
    <div class="dialog">
      <h3>标签管理</h3>
      <div id="tagListManage"></div>
      <div class="footer">
        <button id="closeTagManageBtn" style="background:#777;">关闭</button>
        <button id="addTagBtn">添加标签</button>
      </div>
      <p class="muted">提示：删除标签会将该标签下的短语自动转移到“默认”。</p>
    </div>
  </div>

  <!-- 短语编辑弹窗 -->
  <div id="phraseEditDialog" class="dialog-mask">
    <div class="dialog">
      <h3 id="phraseEditTitle">添加短语</h3>
      <label for="phraseTag">标签（必选）</label>
      <select id="phraseTag"></select>
      <label for="phraseTitle">标题</label>
      <input id="phraseTitle" type="text" placeholder="例如：常用回复" />
      <label for="phraseContent">内容</label>
      <textarea id="phraseContent" placeholder="输入要插入的文本"></textarea>
      <div class="footer">
        <button id="cancelPhraseBtn" style="background:#777;">取消</button>
        <button id="savePhraseBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
