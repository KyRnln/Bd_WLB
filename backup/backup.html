<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据备份与恢复</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/modules.css">
</head>
<body class="page-tool">
  <div class="page-header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>📦 数据备份与恢复</h1>
  </div>

  <div class="card">
    <div id="backupStatus" class="panel-status info"></div>

    <details class="panel" open>
      <summary class="custom-summary">
        <span>☁️ WebDAV 云同步</span>
      </summary>
      <div class="panel-content">
        <p>通过坚果云等WebDAV服务云端备份与恢复</p>
        <label for="webdavUrl">服务器地址</label>
        <input id="webdavUrl" type="text" placeholder="https://dav.jianguoyun.com/dav/" value="https://dav.jianguoyun.com/dav/" />
        <label for="webdavUsername">账号 (邮箱)</label>
        <input id="webdavUsername" type="text" placeholder="输入WebDAV账号" />
        <label for="webdavPassword">应用密码</label>
        <input id="webdavPassword" type="password" placeholder="输入WebDAV应用密码" />
        <div class="flex gap-3 mt-3">
          <button id="backupToWebdavBtn" class="btn-sm flex-1">备份到WebDAV</button>
          <button id="restoreFromWebdavBtn" class="btn-sm flex-1">从WebDAV恢复</button>
        </div>
        <div id="webdavStatus" class="status" style="display:none;"></div>
      </div>
    </details>

    <details class="panel">
      <summary class="custom-summary">
        <span>💾 本地备份与恢复</span>
      </summary>
      <div class="panel-content">
        <div class="mb-4">
          <h4>导出数据</h4>
          <p>将所有数据导出为JSON文件，方便备份和迁移</p>
          <button id="exportDataBtn" class="btn-sm w-full">导出数据</button>
        </div>
        <div class="pt-4" style="border-top:1px solid var(--card-border);">
          <h4>导入数据</h4>
          <p>从JSON文件导入数据，会覆盖现有数据</p>
          <input id="importDataFile" type="file" accept=".json" class="w-full mb-2" />
          <button id="importDataBtn" class="btn-sm w-full">导入数据</button>
        </div>
      </div>
    </details>

    <div class="action-cards mt-4">
      <div class="action-card danger">
        <h4>⚠️ 危险操作</h4>
        <button id="initAppBtn" class="btn-sm">初始化应用</button>
        <button id="clearAllDataBtn" class="btn-sm danger">清除全部数据</button>
      </div>
    </div>
  </div>

  <script src="backup.js"></script>
</body>
</html>
