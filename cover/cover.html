<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>获取视频封面</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <style>
    body {
      width: 480px;
      padding: 16px 20px 24px;
    }
    .progress-bar {
      align-items: center;
      gap: 8px;
      padding: 0 4px;
    }
    .result-card {
      display: flex;
      padding: 8px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      background: #fff;
      gap: 10px;
      margin-bottom: 8px;
    }
    .result-card.error {
      background: #fdecea;
      border-color: #f5c6cb;
    }
  </style>
</head>

<body>
  <div class="page-header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>获取视频封面</h1>
  </div>

  <div class="card">
    <div id="coverPanelStatus" class="status info"></div>
    <div class="description">粘贴TikTok视频链接（每行一个）获取封面并导出XLSX</div>

    <div>
      <textarea id="coverUrlInput"
        placeholder="https://www.tiktok.com/@user/video/123456...&#10;https://www.tiktok.com/@user/video/789012..."
        rows="5"></textarea>
    </div>

    <div class="button-group flex gap-2 justify-center flex-wrap mb-2">
      <button id="coverFetchBtn">获取封面</button>
      <button id="coverClearBtn">清空</button>
      <button class="btn-sm" id="coverExportBtn" style="display:none;">导出XLSX</button>
    </div>

    <div id="coverProgressBar" class="progress-bar">
      <div class="progress-track">
        <div id="coverProgressFill" class="progress-fill"></div>
      </div>
      <span id="coverProgressText" class="progress-text">0/0</span>
    </div>

    <div id="coverStatsRow" class="stats-row">
      <div class="stat total" id="coverStatTotal">总计: 0</div>
      <div class="stat success" id="coverStatSuccess">成功: 0</div>
      <div class="stat error" id="coverStatError">失败: 0</div>
    </div>

    <div id="coverResults" class="results"></div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="cover.js"></script>
</body>

</html>
