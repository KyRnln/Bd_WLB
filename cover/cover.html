<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>获取视频封面</title>
  <style>
    body {
      width: 480px;
      min-height: 520px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f7f7f9;
      color: #222;
      box-sizing: border-box;
      padding: 16px 20px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .back-btn {
      flex: none;
      padding: 6px 12px;
      background: #6c757d;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .back-btn:hover {
      background: #5a6268;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #1a365d;
    }

    .card {
      margin-top: 16px;
      border: 1px solid #e0e6ff;
      border-radius: 10px;
      background: #f0f4ff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      box-sizing: border-box;
      overflow: hidden;
      padding: 14px;
    }

    .status {
      display: none;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .status.success {
      display: block;
      background: #e7f8ec;
      color: #117a42;
    }

    .status.info {
      display: block;
      background: #eef4ff;
      color: #2b4acb;
    }

    .status.error {
      display: block;
      background: #fdecea;
      color: #c0392b;
    }

    .description {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      min-height: 120px;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: #ff0050;
      box-shadow: 0 2px 6px rgba(255, 0, 80, 0.28);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: #fff;
      color: #555;
      border: 1px solid #ddd;
      box-shadow: none;
    }

    button.secondary:hover {
      background: #f8f9fa;
    }

    button.success {
      background: #28a745;
      box-shadow: 0 2px 6px rgba(40, 167, 69, 0.28);
    }

    .progress-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .progress-bar.show {
      display: flex;
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: rgba(0,0,0,0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff0050, #ff6b9d);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
    }

    .stats-row {
      display: none;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 11px;
    }

    .stats-row.show {
      display: flex;
    }

    .stat {
      padding: 3px 8px;
      border-radius: 10px;
    }

    .stat.total {
      background: #eef2ff;
      color: #1a365d;
    }

    .stat.success {
      background: #e7f8ec;
      color: #117a42;
    }

    .stat.error {
      background: #fdecea;
      color: #c0392b;
    }

    .results {
      max-height: 150px;
      overflow-y: auto;
      display: none;
    }

    .results.show {
      display: block;
    }

    .result-card {
      display: flex;
      padding: 8px;
      border: 1px solid #e0e6ff;
      border-radius: 6px;
      background: #fff;
      gap: 10px;
      margin-bottom: 8px;
    }

    .result-card.error {
      background: #fdecea;
      border-color: #f5c6cb;
    }

    .thumbnail {
      flex: none;
      width: 40px;
      height: 71px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
    }

    .thumbnail-placeholder {
      flex: none;
      width: 40px;
      height: 71px;
      background: #f0f0f0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .result-content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .result-index {
      font-size: 10px;
      color: #888;
      margin-bottom: 2px;
    }

    .result-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-title.error {
      color: #c0392b;
    }

    .result-url {
      font-size: 10px;
      color: #666;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .result-actions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .action-btn {
      background: #f0f4ff;
      color: #0369a1;
      border: 1px solid #bae6fd;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 10px;
      cursor: pointer;
    }

    .action-btn:hover {
      background: #e0e9ff;
    }
  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>获取视频封面</h1>
  </div>

  <div class="card">
    <div id="coverPanelStatus" class="status info"></div>
    <div class="description">粘贴TikTok视频链接（每行一个）获取封面并导出XLSX</div>

    <div>
      <textarea id="coverUrlInput"
        placeholder="https://www.tiktok.com/@user/video/123456...&#10;https://www.tiktok.com/@user/video/789012..."
        rows="5"></textarea>
    </div>

    <div class="button-group">
      <button id="coverFetchBtn">获取封面</button>
      <button class="secondary" id="coverClearBtn">清空</button>
      <button class="success" id="coverExportBtn" style="display:none;">导出XLSX</button>
    </div>

    <div id="coverProgressBar" class="progress-bar">
      <div class="progress-track">
        <div id="coverProgressFill" class="progress-fill"></div>
      </div>
      <span id="coverProgressText" class="progress-text">0/0</span>
    </div>

    <div id="coverStatsRow" class="stats-row">
      <div class="stat total" id="coverStatTotal">总计: 0</div>
      <div class="stat success" id="coverStatSuccess">成功: 0</div>
      <div class="stat error" id="coverStatError">失败: 0</div>
    </div>

    <div id="coverResults" class="results"></div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="cover.js"></script>
</body>

</html>
