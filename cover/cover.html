<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>获取视频封面</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/modules.css">
</head>
<body class="page-tool">
  <div class="page-header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>获取视频封面</h1>
  </div>

  <div class="card">
    <div id="coverPanelStatus" class="panel-status info"></div>
    <div id="coverDescription" class="description">粘贴TikTok视频链接（每行一个）获取封面并导出XLSX</div>
    <div id="coverProgressBar" class="progress-display" style="padding: 12px; min-height: auto; margin-bottom: 16px; gap: 12px;">
      <div class="progress-track">
        <div id="coverProgressFill" class="progress-fill"></div>
      </div>
      <span id="coverProgressText" class="progress-text">0/0</span>
    </div>

    <div>
      <textarea id="coverUrlInput"
        placeholder="https://www.tiktok.com/@user/video/123456...&#10;https://www.tiktok.com/@user/video/789012..."
        rows="5"></textarea>
    </div>

    <div class="button-group">
      <button id="coverFetchBtn">获取封面</button>
      <button id="coverClearBtn">清空</button>
      <button id="coverStopBtn" style="display:none;background:#ef4444;color:#fff;">停止</button>
      <button class="btn-sm" id="coverExportBtn" style="display:none;">导出XLSX</button>
    </div>

    <div id="coverStatsRow" class="stats-row">
      <div class="stat total" id="coverStatTotal">总计: 0</div>
      <div class="stat success" id="coverStatSuccess">成功: 0</div>
      <div class="stat error" id="coverStatError">失败: 0</div>
    </div>

    <div id="coverResults" class="results"></div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="cover.js"></script>
</body>
</html>
