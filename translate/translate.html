<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译配置 - 商务WLB插件</title>
  <link rel="stylesheet" href="../styles/base.css">
  <style>
    body {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 20px;
      color: #333;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: #ff0050;
      outline: none;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #ff0050;
      color: #fff;
    }
    .btn-primary:hover {
      background: #e6004a;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #d9d9d9;
    }
    .btn-secondary:hover {
      background: #eee;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .status {
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }
    .section-title {
      font-size: 16px;
      color: #333;
      margin: 24px 0 16px;
      font-weight: 600;
    }
    .target-languages {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .lang-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .lang-tag:hover {
      background: #e0e0e0;
    }
    .lang-tag.selected {
      background: #ff0050;
      color: #fff;
    }
    .lang-tag .remove {
      margin-left: 6px;
      font-size: 12px;
      opacity: 0.7;
    }
    .lang-tag .remove:hover {
      opacity: 1;
    }
    .add-lang {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: #fff;
      border: 1px dashed #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
    }
    .add-lang:hover {
      border-color: #ff0050;
      color: #ff0050;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      width: 300px;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>翻译配置</h1>
    
    <div class="form-group">
      <label>大模型服务商</label>
      <select id="provider">
        <option value="qwen">通义千问 (Qwen)</option>
        <option value="openai">OpenAI</option>
        <option value="deepseek">DeepSeek</option>
        <option value="custom">自定义</option>
      </select>
    </div>

    <div class="form-group">
      <label>API 地址</label>
      <input type="text" id="apiUrl" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions">
      <p class="hint">大模型 API 的请求地址</p>
    </div>

    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="请输入 API Key">
      <p class="hint">您的 API 密钥将安全存储在本地</p>
    </div>

    <div class="form-group">
      <label>模型名称</label>
      <input type="text" id="modelName" placeholder="qwen-mt-plus">
      <p class="hint">用于翻译的模型名称</p>
    </div>

    <div class="section-title">目标语言</div>
    <div class="target-languages" id="targetLanguages">
    </div>
    <div style="margin-top: 8px;">
      <span class="add-lang" id="addLangBtn">+ 添加语言</span>
    </div>

    <div class="form-group" style="margin-top: 20px;">
      <label>翻译提示词（可选）</label>
      <input type="text" id="promptTemplate" placeholder="将以下内容翻译成{target}，保持原文语气和格式：">
      <p class="hint">使用 {target} 作为目标语言的占位符</p>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="saveBtn">保存配置</button>
      <button class="btn btn-secondary" id="testBtn">测试连接</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="modal" id="addLangModal">
    <div class="modal-content">
      <div class="modal-title">添加目标语言</div>
      <div class="form-group">
        <label>语言名称</label>
        <input type="text" id="newLangInput" placeholder="如：英语、日语、泰语">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelLangBtn">取消</button>
        <button class="btn btn-primary" id="confirmLangBtn">添加</button>
      </div>
    </div>
  </div>

  <script src="translate.js"></script>
</body>
</html>
