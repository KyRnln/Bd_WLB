<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即时翻译 - 商务WLB插件</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/modules.css">
</head>
<body class="page-translate-now">
  <div class="container">
    <h1>即时翻译</h1>
    
    <div class="main-content">
      <div class="input-section">
        <textarea id="sourceText" placeholder="输入要翻译的文本..."></textarea>
      </div>
      <div class="lang-section">
        <div class="section-title">目标语言</div>
        <div class="target-languages" id="targetLanguages"></div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="translateBtn">翻译</button>
      <button class="btn btn-secondary" id="clearBtn">清空</button>
    </div>

    <div class="status" id="status"></div>

    <div class="translate-result" id="resultArea" style="display:none; margin-top: 16px;">
      <div class="section-title">翻译结果</div>
      <div id="translatedText"></div>
    </div>
  </div>

  <script src="translate_now.js"></script>
</body>
</html>
