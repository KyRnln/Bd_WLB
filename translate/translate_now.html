<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即时翻译 - 商务WLB插件</title>
  <link rel="stylesheet" href="../styles/base.css">
  <style>
    body {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 20px;
      color: #333;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .main-content {
      display: flex;
      gap: 20px;
    }
    .input-section {
      flex: 1;
    }
    .lang-section {
      width: 140px;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 14px;
      color: #333;
      margin-bottom: 10px;
      font-weight: 500;
    }
    textarea {
      width: 100%;
      min-height: 150px;
      padding: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      resize: vertical;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea:focus {
      border-color: #ff0050;
      outline: none;
    }
    .target-languages {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .lang-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .lang-tag:hover {
      background: #e0e0e0;
    }
    .lang-tag.selected {
      background: #fff0f5;
      border-color: #ff0050;
      color: #ff0050;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #ff0050;
      color: #fff;
    }
    .btn-primary:hover {
      background: #e6004a;
    }
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #d9d9d9;
    }
    .btn-secondary:hover {
      background: #eee;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .status {
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }
    .status.info {
      background: #e3f2fd;
      color: #1565c0;
      display: block;
    }
    .result-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .result-card {
      background: #fafafa;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #eee;
    }
    .result-card:last-child {
      margin-bottom: 0;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .result-lang {
      font-size: 13px;
      font-weight: 600;
      color: #ff0050;
    }
    .result-copy {
      font-size: 12px;
      color: #666;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #ddd;
    }
    .result-copy:hover {
      background: #f0f0f0;
    }
    .result-text {
      font-size: 14px;
      color: #333;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .no-langs {
      font-size: 13px;
      color: #999;
      text-align: center;
      padding: 20px 0;
    }
    .no-langs a {
      color: #ff0050;
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .back-btn {
      padding: 6px 12px;
      background: #f5f5f5;
      color: #333;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .back-btn:hover {
      background: #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>即时翻译</h1>

    <div class="main-content">
      <div class="input-section">
        <div class="section-title">输入文本</div>
        <textarea id="inputText" placeholder="请输入要翻译的内容..."></textarea>
      </div>
      <div class="lang-section">
        <div class="section-title">目标语言</div>
        <div class="target-languages" id="targetLanguages">
          <div class="no-langs">暂无语言<br><a href="translate.html">去添加</a></div>
        </div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="translateBtn">翻译</button>
      <button class="btn btn-secondary" id="clearBtn">清空</button>
    </div>

    <div class="status" id="status"></div>

    <div class="result-section" id="resultSection" style="display: none;">
      <div class="section-title">翻译结果</div>
      <div id="results"></div>
    </div>
  </div>

  <script src="translate_now.js"></script>
</body>
</html>
