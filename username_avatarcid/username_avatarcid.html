<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>获取头像/CID</title>
  <style>
    body {
      width: 480px;
      min-height: 520px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f7f7f9;
      color: #222;
      box-sizing: border-box;
      padding: 16px 20px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .back-btn {
      flex: none;
      padding: 6px 12px;
      background: #6c757d;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .back-btn:hover {
      background: #5a6268;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #1a365d;
    }

    .card {
      margin-top: 16px;
      border: 1px solid #e0e6ff;
      border-radius: 10px;
      background: #f0f4ff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      box-sizing: border-box;
      overflow: hidden;
      padding: 14px;
    }

    .status {
      display: none;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .status.success {
      display: block;
      background: #e7f8ec;
      color: #117a42;
    }

    .status.info {
      display: block;
      background: #eef4ff;
      color: #2b4acb;
    }

    .status.error {
      display: block;
      background: #fdecea;
      color: #c0392b;
    }

    .description {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      min-height: 120px;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.success {
      background: #28a745;
    }

    button.info {
      background: #0369a1;
    }

    button.danger {
      background: #dc2626;
    }

    button.warning {
      background: #f59e0b;
    }

    .progress-bar {
      display: none;
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.08);
      border-radius: 3px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .progress-bar.show {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: #ff0050;
      width: 0%;
      transition: width 0.3s ease;
    }

    .results {
      display: none;
      max-height: 130px;
      overflow-y: auto;
      border: 1px solid #e0e6ff;
      border-radius: 6px;
      background: #fff;
    }

    .results.show {
      display: block;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid #eef0ff;
      font-size: 11px;
      font-family: monospace;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-id {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #333;
    }

    .result-cid {
      flex: 1;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-cid.success {
      color: #1d5fff;
    }

    .result-cid.error {
      color: #e53e3e;
    }
  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>获取头像/CID</h1>
  </div>

  <div class="card">
    <div id="cidPanelStatus" class="status info"></div>
    <div class="description">输入达人ID批量获取头像以及CID，需在达人管理页使用</div>

    <div>
      <textarea id="cidCreatorInput" placeholder="输入达人昵称或ID，每行一个&#10;例如：&#10;creator1&#10;creator2" rows="5"></textarea>
    </div>

    <div class="button-group">
      <button class="success" id="cidSearchBtn">开始获取</button>
      <button class="warning" id="cidStopBtn" style="display:none;">停止搜索</button>
      <button class="info" id="cidExportBtn">导出XLSX</button>
      <button class="danger" id="cidClearBtn">清除暂存数据</button>
    </div>

    <div id="cidStatus" style="display:none;padding:8px 10px;border-radius:6px;font-size:12px;margin-bottom:6px;"></div>

    <div id="cidProgressBar" class="progress-bar">
      <div id="cidProgressFill" class="progress-fill"></div>
    </div>

    <div id="cidResults" class="results"></div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="username_avatarcid.js"></script>
</body>

</html>
