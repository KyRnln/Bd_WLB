<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通过CID获取达人信息</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/modules.css">
</head>
<body class="page-tool">
  <div class="page-header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>通过CID获取达人信息</h1>
  </div>

  <div class="card">
    <div id="cidToNamePanelStatus" class="panel-status info"></div>
    <div class="description">批量输入CID查询达人用户名与头像并导出XLSX</div>

    <div>
      <textarea id="cidToNameInput"
        placeholder="输入批量CID，每行一个&#10;例如：&#10;7494078236625438400&#10;7494078236625438401" rows="5"></textarea>
    </div>

    <div class="region-select">
      <label for="cidToNameRegion">地区:</label>
      <select id="cidToNameRegion">
        <option value="MY">马来西亚 (MY)</option>
        <option value="SG">新加坡 (SG)</option>
        <option value="TH">泰国 (TH)</option>
        <option value="VN">越南 (VN)</option>
        <option value="PH">菲律宾 (PH)</option>
        <option value="ID">印尼 (ID)</option>
      </select>
    </div>

    <div class="button-group">
      <button class="btn-sm" id="cidToNameSearchBtn">批量查询</button>
      <button class="btn-sm" id="cidToNameStopBtn" style="display:none;background:#ef4444;color:#fff;">停止</button>
      <button class="btn-sm" id="cidToNameExportBtn">导出XLSX</button>
      <button class="btn-sm" id="cidToNameClearBtn">清空全部数据</button>
    </div>

    <div id="cidToNameResults" class="results results-list">
      <div class="empty-state">暂无数据</div>
    </div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="cid_to_name.js"></script>
</body>
</html>
