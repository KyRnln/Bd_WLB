<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通过CID获取达人信息</title>
  <style>
    body {
      width: 480px;
      min-height: 520px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f7f7f9;
      color: #222;
      box-sizing: border-box;
      padding: 16px 20px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .back-btn {
      flex: none;
      padding: 6px 12px;
      background: #6c757d;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .back-btn:hover {
      background: #5a6268;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #1a365d;
    }

    .card {
      margin-top: 16px;
      border: 1px solid #e0e6ff;
      border-radius: 10px;
      background: #f0f4ff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      box-sizing: border-box;
      overflow: hidden;
      padding: 14px;
    }

    .status {
      display: none;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .status.success {
      display: block;
      background: #e7f8ec;
      color: #117a42;
    }

    .status.info {
      display: block;
      background: #eef4ff;
      color: #2b4acb;
    }

    .status.error {
      display: block;
      background: #fdecea;
      color: #c0392b;
    }

    .description {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      min-height: 120px;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .region-select {
      margin-bottom: 10px;
    }

    .region-select label {
      font-size: 12px;
      color: #666;
      margin-right: 6px;
    }

    .region-select select {
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.success {
      background: #28a745;
    }

    button.info {
      background: #0369a1;
    }

    button.danger {
      background: #dc2626;
    }

    .results {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #e0e6ff;
      border-radius: 6px;
      background: #fff;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
    }

    .result-item {
      display: flex;
      align-items: center;
      padding: 8px;
      border: 1px solid #e0e6ff;
      border-radius: 6px;
      background: #f9f9f9;
    }

    .result-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
    }

    .result-avatar-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #eee;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
    }

    .result-content {
      flex: 1;
      overflow: hidden;
      font-size: 12px;
      color: #333;
    }

    .result-line {
      margin-bottom: 2px;
    }

    .result-label {
      font-weight: bold;
      color: #1a365d;
    }

    .result-time {
      color: #999;
      font-size: 10px;
      margin-top: 2px;
    }

    .empty-state {
      padding: 10px;
      text-align: center;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" id="backBtn">← 返回</button>
    <h1>通过CID获取达人信息</h1>
  </div>

  <div class="card">
    <div id="cidToNamePanelStatus" class="status info"></div>
    <div class="description">批量输入CID查询达人用户名与头像并导出XLSX</div>

    <div>
      <textarea id="cidToNameInput"
        placeholder="输入批量CID，每行一个&#10;例如：&#10;7494078236625438400&#10;7494078236625438401" rows="5"></textarea>
    </div>

    <div class="region-select">
      <label for="cidToNameRegion">地区:</label>
      <select id="cidToNameRegion">
        <option value="MY">马来西亚 (MY)</option>
        <option value="SG">新加坡 (SG)</option>
        <option value="TH">泰国 (TH)</option>
        <option value="VN">越南 (VN)</option>
        <option value="PH">菲律宾 (PH)</option>
        <option value="ID">印尼 (ID)</option>
      </select>
    </div>

    <div class="button-group">
      <button class="success" id="cidToNameSearchBtn">批量查询</button>
      <button class="info" id="cidToNameExportBtn">导出XLSX</button>
      <button class="danger" id="cidToNameClearBtn">清空全部数据</button>
    </div>

    <div id="cidToNameResults" class="results">
      <div class="empty-state">暂无数据</div>
    </div>
  </div>

  <script src="../libs/exceljs.min.js"></script>
  <script src="cid_to_name.js"></script>
</body>

</html>
